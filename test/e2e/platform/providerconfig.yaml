apiVersion: flux.services.openmcp.cloud/v1alpha1
kind: ProviderConfig
metadata:
  name: flux
spec:
  versions:
    - version: "2.8.3"
      chartVersion: "2.18.2"
      chartUrl: "oci://ghcr.io/fluxcd-community/charts/flux2"
      chartPullSecret: flux-registry-credentials
      values:
        imagePullSecrets:
          - name: flux-registry-credentials
        helmController:
          image: ghcr.io/fluxcd/helm-controller
          tag: v1.5.3
        imageAutomationController:
          image: ghcr.io/fluxcd/image-automation-controller
          tag: v1.1.1
        imageReflectionController:
          image: ghcr.io/fluxcd/image-reflector-controller
          tag: v1.1.1
        kustomizeController:
          image: ghcr.io/fluxcd/kustomize-controller
          tag: v1.8.2
        notificationController:
          image: ghcr.io/fluxcd/notification-controller
          tag: v1.8.2
        sourceController:
          image: ghcr.io/fluxcd/source-controller
          tag: v1.8.1
        sourceWatcher:
          create: true
          image: ghcr.io/fluxcd/source-watcher
          tag: v2.1.1