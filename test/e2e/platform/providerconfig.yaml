apiVersion: flux.services.openmcp.cloud/v1alpha1
kind: ProviderConfig
metadata:
  name: flux
spec:
  pollInterval: 1m
  versions:
    - version: "2.16.2"
      chartUrl: "oci://ghcr.io/fluxcd-community/charts/flux2"
      chartPullSecret: flux-registry-credentials
      values:
        imagePullSecrets:
          - name: flux-registry-credentials
